<template>
    <template if:false={loggedIn}>
        <section class="provar-theme slds-p-around_medium slds-card slds-m-bottom_large" aria-label="Bug Hunt Login">
            <h1 class="provar-title slds-text-heading_large">Join the Bug Hunt</h1>
            <div class="slds-grid slds-wrap slds-gutters slds-m-top_small">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_2-of-3">
                    <lightning-input
                        type="text"
                        label="Your Username"
                        value={loginUsername}
                        onchange={handleLoginUsername}
                        required
                        pattern="\.{5,}"
                        message-when-pattern-mismatch="Enter at least 5 characters"
                        message-when-value-missing="This field is required"
                    ></lightning-input>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-3 slds-m-top_medium">
                    <lightning-button variant="brand" label="Start Bug Hunt" title="Continue" onclick={completeLogin} disabled={isLoginDisabled}></lightning-button>
                </div>
            </div>
        </section>
    </template>

    <template if:true={loggedIn}>
        <lightning-card title="Bug Hunt" icon-name="standard:case" class="provar-theme">
            <div class="slds-p-horizontal_medium slds-p-top_small slds-text-title_caps slds-theme_alert-texture slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-grow">
                    Bug Hunt user: <strong>{loginUsername}</strong>
                    <lightning-button variant="base" class="slds-m-left_small" label="Change user" title="Change user" onclick={changeUser}></lightning-button>
                </div>
                <template if:true={hasTimer}>
                    <div class="slds-col slds-text-heading_medium" title="Time remaining">⏱ {timerDisplay}</div>
                    <template if:true={timerExpired}>
                        <div class="slds-col slds-text-color_error slds-text-body_small">Time's up!</div>
                    </template>
                </template>
                &nbsp;Bug Hunt Instructions:
                <ul class="slds-list_dotted slds-m-left_medium slds-m-top_x-small">
                    <li>Create Cases with various values for Subject, Origin, Type, Priority, Reason, and Description.</li>
                    <li>Navigate to the Cases view in Coral Cloud Resorts App to verify your case details.</li>
                    <li>Utilize Developer Console, Workbench, or other tools to explore and manipulate your data.</li>
                    <li>Use your testing creativity!</li>
                </ul>
            </div>
            <div class="slds-p-around_medium slds-grid slds-wrap slds-gutters">
                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-input type="email" label="Contact Email" value={prefillEmail} onchange={handleEmailChange}></lightning-input>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                    <lightning-file-upload label="Attach Screenshot" record-id={newRecordId}></lightning-file-upload>
                </div>

                <div class="slds-col slds-size_1-of-1">
                    <lightning-record-edit-form object-api-name="Case" onsubmit={handleSubmit} onsuccess={handleSuccess} onerror={handleError}>
                        <div class="slds-grid slds-wrap slds-gutters">
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="Subject" data-field="Subject"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="Origin" data-field="Origin"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-combobox
                                    name="Type"
                                    label="Type"
                                    value={selectedType}
                                    options={typeOptions}
                                    onchange={handleTypeChange}
                                    data-field="Type"
                                ></lightning-combobox>
                            </div>
                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="Priority" data-field="Priority"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-medium-size_1-of-2">
                                <lightning-input-field field-name="Reason" data-field="Reason"></lightning-input-field>
                            </div>

                            <div class="slds-col slds-size_1-of-1">
                                <lightning-input-field field-name="Description" data-field="Description"></lightning-input-field>
                                <p class="slds-text-color_weak slds-text-body_small slds-m-top_xx-small">Tip: include steps to reproduce and expected vs actual behavior.</p>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-m-top_small">
                                <lightning-input type="toggle" label="Urgent?" checked={urgent} onchange={handleUrgentChange}></lightning-input>
                            </div>

                            <div class="slds-col slds-size_1-of-1 slds-m-top_medium">
                                <lightning-button type="submit" variant="brand" label="Submit Case"></lightning-button>
                                <lightning-button type="button" class="slds-m-left_small" variant="neutral" label="Report a Bug" onclick={openReport}></lightning-button>
                            </div>
                        </div>
                    </lightning-record-edit-form>
                </div>
            </div>
        </lightning-card>
        
    </template>

    <!-- Report Bug Modal -->
    <template if:true={showReport}>
        <template if:false={timerExpired}>
            <section role="dialog" tabindex="-1" aria-modal="true" aria-label="Report a Bug" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container">
                    <header class="slds-modal__header">
                        <h2 class="slds-text-heading_medium">Report a Bug</h2>
                    </header>
                    <div class="slds-modal__content slds-p-around_medium">
                        <lightning-textarea label="What happened?" value={reportText} onchange={handleReportChange}></lightning-textarea>
                        <div class="slds-m-top_small">
                            <lightning-input type="checkbox" label="Include technical details" checked={includeTech} onchange={handleToggleTech}></lightning-input>
                        </div>
                    </div>
                    <footer class="slds-modal__footer">
                        <lightning-button variant="neutral" label="Cancel" onclick={closeReport}></lightning-button>
                        <lightning-button class="slds-m-left_small" variant="brand" label="Send" onclick={sendReport}></lightning-button>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </template>
    </template>
</template>
